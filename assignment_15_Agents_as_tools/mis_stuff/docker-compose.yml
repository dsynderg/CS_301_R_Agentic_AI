services:
  software-team-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: software-team-agent:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in your shell or .env file}
    stdin_open: true
    tty: true
    volumes:
      - .:/app
    command: ["software_team.yaml", "--debug"]
